services:

  db:
    image: postgres:14
    container_name: task_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: task_manager_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: task_backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/task_manager_db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: task_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data: