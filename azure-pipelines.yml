trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  ACR_NAME: taskmanager
  ACR_LOGIN_SERVER: taskmanager.azurecr.io
  BACKEND_IMAGE: task-backend
  FRONTEND_IMAGE: task-frontend
  TAG: $(Build.BuildId)

steps:
  - task: AzureCLI@2
    displayName: Login to Azure
    inputs:
      azureSubscription: azure-service-connection
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az acr login --name $(ACR_NAME)
  - script: |
      docker build -t $(ACR_LOGIN_SERVER)/$(BACKEND_IMAGE):$(TAG) ./backend
      docker push $(ACR_LOGIN_SERVER)/$(BACKEND_IMAGE):$(TAG)
    displayName: Build and Push Backend Image
  - script: |
      docker build -t $(ACR_LOGIN_SERVER)/$(FRONTEND_IMAGE):$(TAG) ./frontend
      docker push $(ACR_LOGIN_SERVER)/$(FRONTEND_IMAGE):$(TAG)
    displayName: Build and Push Frontend Image
